<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Acceso Denegado | ERROR 403</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #E10600;
            --primary-hover: #FF2A2A;
            --primary-glow: rgba(225, 6, 0, 0.6);
            --bg-primary: #0a0a0f;
            --bg-secondary: #0f0f15;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0b0;
            --border-dim: rgba(225, 6, 0, 0.2);
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo animado con líneas de grid */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(0deg, transparent 24%, rgba(225, 6, 0, 0.03) 25%, rgba(225, 6, 0, 0.03) 26%, transparent 27%, transparent 74%, rgba(225, 6, 0, 0.03) 75%, rgba(225, 6, 0, 0.03) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(225, 6, 0, 0.03) 25%, rgba(225, 6, 0, 0.03) 26%, transparent 27%, transparent 74%, rgba(225, 6, 0, 0.03) 75%, rgba(225, 6, 0, 0.03) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        /* Partículas flotantes */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
            opacity: 0;
        }

        .particle:nth-child(1) { left: 15%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 35%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 55%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 75%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 85%; animation-delay: 4s; }
        .particle:nth-child(6) { left: 25%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 65%; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 45%; animation-delay: 3.5s; }

        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem;
            max-width: 650px;
            width: 90%;
            background: rgba(15, 15, 21, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-dim);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(225, 6, 0, 0.2), 0 0 80px rgba(225, 6, 0, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        .error-glitch {
            font-family: 'Orbitron', monospace;
            font-size: 10rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 
                0 0 10px var(--primary-glow),
                0 0 20px var(--primary-glow),
                0 0 40px var(--primary-glow),
                0 0 80px var(--primary-glow);
            line-height: 1;
            position: relative;
            animation: glitch 2s infinite;
        }

        .error-glitch::before,
        .error-glitch::after {
            content: '403';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .error-glitch::before {
            color: #0ff;
            z-index: -1;
            animation: glitch-effect 3s infinite;
        }

        .error-glitch::after {
            color: #f0f;
            z-index: -2;
            animation: glitch-effect 2s infinite;
        }

        .error-icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .error-icon {
            font-size: 4rem;
            color: var(--primary);
            filter: drop-shadow(0 0 15px rgba(225, 6, 0, 0.6));
            animation: pulse 2s ease-in-out infinite;
        }

        .error-icon-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0;
            animation: ripple 2s ease-out infinite;
        }

        .error-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin: 1rem 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(225, 6, 0, 0.5);
        }

        .error-subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.8;
            border-left: 3px solid var(--primary);
            padding-left: 1.5rem;
            text-align: left;
            display: inline-block;
        }

        .error-subtitle i {
            color: var(--primary);
            margin-right: 0.5rem;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 2rem auto;
        }

        .error-actions {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: 2px solid var(--primary);
            box-shadow: 0 4px 15px rgba(225, 6, 0, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(225, 6, 0, 0.5);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(225, 6, 0, 0.1);
            border-color: var(--primary-hover);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(225, 6, 0, 0.3);
        }

        .status-indicator {
            margin-top: 2rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        /* Animaciones */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        @keyframes glitch-effect {
            0%, 100% { clip-path: inset(0 0 0 0); }
            20% { clip-path: inset(20% 0 60% 0); }
            40% { clip-path: inset(60% 0 20% 0); }
            60% { clip-path: inset(40% 0 40% 0); }
            80% { clip-path: inset(80% 0 10% 0); }
        }

        @keyframes ripple {
            0% {
                width: 60px;
                height: 60px;
                opacity: 1;
            }
            100% {
                width: 150px;
                height: 150px;
                opacity: 0;
            }
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        @keyframes float {
            0%, 100% {
                opacity: 0;
                transform: translateY(0) scale(1);
            }
            50% {
                opacity: 0.8;
                transform: translateY(-30px) scale(1.5);
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-glitch {
                font-size: 5rem;
            }
            
            .error-title {
                font-size: 1.3rem;
                letter-spacing: 2px;
            }
            
            .error-subtitle {
                font-size: 0.85rem;
            }
            
            .error-actions {
                flex-direction: column;
                gap: 1rem;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
                font-size: 0.7rem;
            }
            
            .error-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fondo -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Contenido principal -->
    <div class="error-container">
        <!-- Icono con efecto de anillo -->
        <div class="error-icon-wrapper">
            <div class="error-icon-ring"></div>
            <div class="error-icon">
                <i class="fas fa-shield-halved"></i>
            </div>
        </div>

        <!-- Código de error con efecto glitch -->
        <div class="error-glitch">403</div>

        <!-- Título -->
        <h1 class="error-title">Acceso Denegado</h1>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Mensaje -->
        <p class="error-subtitle">
            <i class="fas fa-exclamation-triangle"></i> No tienes los permisos necesarios para acceder a esta área restringida.<br>
            <i class="fas fa-terminal"></i> Si crees que se trata de un error del sistema, contacta al administrador de la plataforma.
        </p>

        <!-- Botones de acción -->
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Volver al Inicio
            </a>
            <a href="javascript:history.back()" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Página Anterior
            </a>
        </div>

        <!-- Indicador de estado -->
        <div class="status-indicator">
            <span class="status-dot"></span>
            <span>SYSTEM_STATUS: RESTRICTED_ACCESS</span>
        </div>
    </div>
</body>
</html>
