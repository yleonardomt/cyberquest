<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Acceso denegado</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #E10600;
            --primary-hover: #FF2A2A;
            --bg-primary: #0a0a0f;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .error-code {
            font-family: 'Orbitron', monospace;
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 30px rgba(225, 6, 0, 0.3);
            line-height: 1;
        }

        .error-icon {
            font-size: 5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .error-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .error-message {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(225, 6, 0, 0.4);
        }

        @media (max-width: 768px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-lock"></i>
        </div>
        <div class="error-code">403</div>
        <h1 class="error-title">Acceso denegado</h1>
        <p class="error-message">
            <i class="fas fa-shield-alt"></i> No tienes permiso para acceder a esta página.<br>
            Si crees que esto es un error, contacta al administrador.
        </p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Ir al inicio
            </a>
            <a href="javascript:history.back()" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Volver atrás
            </a>
        </div>
    </div>
</body>
</html>
