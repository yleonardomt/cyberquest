<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Editar Reto: {{ reto.titulo }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'principal.css' %}">
    <style>
        .form-control {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(225, 6, 0, 0.3);
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary);
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
        }
        textarea.form-control {
            resize: vertical;
            font-family: 'Courier New', monospace;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
            font-family: 'Orbitron', monospace;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary-light);
        }
        .activity-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
        }
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .page-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            color: var(--text-primary);
        }
        .docker-config {
            background: var(--bg-dark);
            border-radius: var(--radius);
            padding: 1rem;
            margin-top: 0.5rem;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .checkbox-group input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        hr {
            border-color: var(--border-dark);
            margin: 1.5rem 0;
        }
        .code-editor {
            background: var(--bg-dark);
            border-radius: var(--radius);
            padding: 0.75rem;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            width: 100%;
            min-height: 200px;
            color: var(--text-primary);
            border: 1px solid var(--border-dark);
        }
        .code-editor:focus {
            outline: none;
            border-color: var(--primary);
        }
    </style>
</head>
<body>

<div class="app-container">
    
    {% include 'nav.html' %}

    <main class="main-content">
        <div class="top-header">
            <h1 class="page-title">Editar Reto: {{ reto.titulo }}</h1>
        </div>

        <div class="activity-card">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <!-- Informacion basica -->
                <div style="margin-bottom: 1rem;">
                    <label>Titulo del Reto</label>
                    <input type="text" name="titulo" class="form-control" value="{{ reto.titulo }}" required>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label>Descripcion</label>
                    <textarea name="descripcion" rows="5" class="form-control" required>{{ reto.descripcion }}</textarea>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label>Categoria</label>
                    <select name="categoria" class="form-control" required>
                        {% for categoria in categorias %}
                        <option value="{{ categoria.id }}" {% if reto.categoria.id == categoria.id %}selected{% endif %}>
                            {{ categoria.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label>Dificultad</label>
                    <select name="dificultad" class="form-control" required>
                        <option value="PRINCIPIANTE" {% if reto.dificultad == 'PRINCIPIANTE' %}selected{% endif %}>Principiante</option>
                        <option value="INTERMEDIO" {% if reto.dificultad == 'INTERMEDIO' %}selected{% endif %}>Intermedio</option>
                        <option value="AVANZADO" {% if reto.dificultad == 'AVANZADO' %}selected{% endif %}>Avanzado</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label>Puntos</label>
                    <input type="number" name="puntos" class="form-control" value="{{ reto.puntos }}" required>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label>Bandera (Flag)</label>
                    <input type="text" name="bandera" class="form-control" value="{{ reto.bandera }}" required>
                    <small style="color: var(--text-muted);">Formato: flag{contenido}</small>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label>Pista (Opcional)</label>
                    <textarea name="pista" rows="2" class="form-control">{{ reto.pista }}</textarea>
                </div>
                
                <hr>
                
                <!-- ENTORNO DOCKER -->
                <div style="margin-bottom: 1rem;">
                    <label>Entorno Docker</label>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" name="habilitar_docker" id="habilitar_docker" value="true" {% if reto.tiene_docker %}checked{% endif %}>
                        <label for="habilitar_docker">Habilitar entorno Docker para este reto</label>
                    </div>
                    
                    <div id="docker_config" style="display: {% if reto.tiene_docker %}block{% else %}none{% endif %};">
                        <div class="docker-config">
                            <div style="margin-bottom: 1rem;">
                                <label>Dockerfile</label>
                                <textarea name="dockerfile_texto" rows="12" class="code-editor" placeholder="FROM nginx:alpine&#10;RUN echo 'flag{prueba}' > /usr/share/nginx/html/index.html&#10;EXPOSE 80">{{ reto.dockerfile|default:"" }}</textarea>
                                <small>Escribe o modifica el Dockerfile</small>
                            </div>
                        </div>
                    </div>
                </div>
                
                <hr>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                    <a href="{% url 'detalle_reto' reto.id %}" class="btn btn-outline">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    const checkbox = document.getElementById('habilitar_docker');
    const dockerConfig = document.getElementById('docker_config');
    
    checkbox.addEventListener('change', function() {
        if (this.checked) {
            dockerConfig.style.display = 'block';
        } else {
            dockerConfig.style.display = 'none';
        }
    });
</script>

</body>
</html>
