<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Editar Evento CTF</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'principal.css' %}">
    <style>
        .form-control {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(225, 6, 0, 0.3);
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary);
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
        }
        textarea.form-control {
            resize: vertical;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
            font-family: 'Orbitron', monospace;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .activity-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            color: var(--text-primary);
        }
        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-dark);
            padding-bottom: 0.5rem;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .checkbox-group input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .col {
            flex: 1;
            min-width: 200px;
        }
        hr {
            border-color: var(--border-dark);
            margin: 1.5rem 0;
        }
        .retos-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
            max-height: 300px;
            overflow-y: auto;
            padding: 0.5rem;
            background: var(--bg-secondary);
            border-radius: var(--radius);
        }
        .reto-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }
        .reto-checkbox:hover {
            background: var(--primary-light);
        }
        .reto-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .reto-checkbox label {
            margin-bottom: 0;
            cursor: pointer;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
<style>
input[type="datetime-local"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
}
</style>
<div class="app-container">
    
    {% include 'nav.html' %}

    <main class="main-content">
        <div class="top-header">
            <h1 class="page-title">Editar Evento CTF: {{ evento.nombre }}</h1>
        </div>

        <div class="activity-card">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <h3 class="section-title"><i class="fas fa-info-circle"></i> Información del Evento</h3>
                
                <div style="margin-bottom: 1rem;">
                    <label><i class="fas fa-tag"></i> Nombre del Evento</label>
                    <input type="text" name="nombre" class="form-control" value="{{ evento.nombre }}" required>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label><i class="fas fa-align-left"></i> Descripción</label>
                    <textarea name="descripcion" rows="4" class="form-control" required>{{ evento.descripcion }}</textarea>
                </div>
                
                <div class="row">
                    <div class="col">
                        <label><i class="fas fa-calendar-alt"></i> Fecha de Inicio</label>
                        <input type="datetime-local" name="fecha_inicio" class="form-control" value="{{ evento.fecha_inicio|date:'Y-m-d\TH:i' }}" required>
                    </div>
                    <div class="col">
                        <label><i class="fas fa-calendar-check"></i> Fecha de Fin</label>
                        <input type="datetime-local" name="fecha_fin" class="form-control" value="{{ evento.fecha_fin|date:'Y-m-d\TH:i' }}" required>
                    </div>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label><i class="fas fa-gavel"></i> Reglas del Evento</label>
                    <textarea name="reglas" rows="5" class="form-control">{{ evento.reglas }}</textarea>
                </div>
                
                <hr>
                
                <h3 class="section-title"><i class="fas fa-flag"></i> Retos del Evento</h3>
                
                <div class="retos-list">
                    {% for reto in retos %}
                    <div class="reto-checkbox">
                        <input type="checkbox" name="retos" value="{{ reto.id }}" id="reto_{{ reto.id }}" {% if reto in evento.retos.all %}checked{% endif %}>
                        <label for="reto_{{ reto.id }}">
                            <strong>{{ reto.titulo }}</strong> - {{ reto.puntos }} pts
                            <span style="color: var(--text-muted);">({{ reto.categoria.nombre }})</span>
                        </label>
                    </div>
                    {% empty %}
                    <p style="text-align: center; color: var(--text-muted); padding: 2rem;">
                        No hay retos disponibles. Crea retos primero.
                    </p>
                    {% endfor %}
                </div>
                
                
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                    <a href="{% url 'listar_eventos' %}" class="btn btn-outline">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
