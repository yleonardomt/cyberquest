{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - CyberQuest</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'principal.css' %}">
    <style>
        .editar-contenedor {
            background: var(--bg-card);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-lg);
            overflow: hidden;
            max-width: 650px;
            margin: 0 auto;
        }

        .editar-cabecera {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .avatar-editar {
            width: 120px;
            height: 120px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            border: 3px solid var(--primary);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .avatar-editar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-editar i {
            font-size: 3rem;
            color: var(--primary);
        }

        .avatar-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            text-align: center;
            padding: 0.3rem;
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .avatar-editar:hover .avatar-overlay {
            opacity: 1;
        }

        .editar-titulo {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .mensaje-info {
            background: var(--primary-light);
            padding: 0.75rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--primary);
        }

        .editar-cuerpo {
            padding: 2rem;
        }

        .grupo-formulario {
            margin-bottom: 1.5rem;
        }

        .grupo-formulario label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary);
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
        }

        .grupo-formulario label i {
            margin-right: 0.5rem;
        }

        .grupo-formulario input {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
        }

        .grupo-formulario input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grupo-formulario input[type="file"] {
            padding: 0.5rem;
            background: var(--bg-secondary);
        }

        .avatar-preview {
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .acciones-formulario {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-guardar {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary);
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: var(--radius);
            text-decoration: none;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-guardar:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-cancelar {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.7rem 1.5rem;
            border-radius: var(--radius);
            text-decoration: none;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-cancelar:hover {
            background: var(--primary-light);
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 80px;
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        {% include 'nav.html' %}

        <main class="main-content">
            <div class="editar-contenedor">
                <div class="editar-cabecera">
                    <div class="avatar-editar" id="avatar-container">
                        {% if perfil.avatar %}
                        <img src="{{ perfil.avatar.url }}" alt="Avatar" id="avatar-img">
                        {% else %}
                        <i class="fas fa-user" id="avatar-icon"></i>
                        {% endif %}
                        <div class="avatar-overlay">
                            <i class="fas fa-camera"></i> Cambiar
                        </div>
                    </div>
                    <h1 class="editar-titulo">Editar Perfil</h1>
                    <p class="mensaje-info">Actualiza tu información personal y avatar</p>
                </div>

                <div class="editar-cuerpo">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="grupo-formulario">
                            <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                            <input type="email" name="email" value="{{ perfil.usuario.email }}" placeholder="tu@email.com">
                        </div>

                        <div class="grupo-formulario">
                            <label><i class="fas fa-phone"></i> Teléfono</label>
                            <input type="text" name="telefono" value="{{ perfil.telefono|default:'' }}" placeholder="Ej: 12345678">
                        </div>

                        <div class="grupo-formulario">
                            <label><i class="fas fa-image"></i> Avatar</label>
                            <input type="file" name="avatar" id="avatar-input" accept="image/*" style="display: none;">
                            <input type="file" name="avatar" class="form-control" accept="image/*">
                            <div class="avatar-preview">Formatos permitidos: JPG, PNG, GIF. Tamaño máximo: 2MB</div>
                        </div>

                        <div class="acciones-formulario">
                            <button type="submit" class="btn-guardar">
                                <i class="fas fa-save"></i> Guardar Cambios
                            </button>
                            <a href="{% url 'perfil_detalle' %}" class="btn-cancelar">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Previsualizar avatar antes de subir
        const avatarInput = document.querySelector('input[name="avatar"]');
        const avatarImg = document.getElementById('avatar-img');
        const avatarIcon = document.getElementById('avatar-icon');
        
        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    if (avatarImg) {
                        avatarImg.src = event.target.result;
                        avatarImg.style.display = 'block';
                        if (avatarIcon) avatarIcon.style.display = 'none';
                    } else {
                        const container = document.getElementById('avatar-container');
                        const newImg = document.createElement('img');
                        newImg.id = 'avatar-img';
                        newImg.src = event.target.result;
                        newImg.style.width = '100%';
                        newImg.style.height = '100%';
                        newImg.style.objectFit = 'cover';
                        if (avatarIcon) avatarIcon.style.display = 'none';
                        container.appendChild(newImg);
                    }
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>

</html>
