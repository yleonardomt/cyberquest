<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Editar Equipo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'principal.css' %}">
    <style>
        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-lg);
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        textarea.form-control {
            resize: vertical;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .top-header {
            margin-bottom: 1.5rem;
        }
        .page-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            color: var(--text-primary);
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00aa00;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            z-index: 1000;
            animation: slideInRight 0.3s ease, fadeOut 3s ease 2.7s forwards;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-left: 4px solid white;
        }
        .toast-message.error {
            background: #cc0000;
        }
        .toast-message.warning {
            background: #ff8800;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    {% include 'nav.html' %}

    <main class="main-content">
        
        {% if messages %}
            {% for message in messages %}
            <div class="toast-message {% if message.tags %}{{ message.tags }}{% endif %}">
                <i class="fas {% if message.tags == 'error' %}fa-exclamation-triangle{% elif message.tags == 'success' %}fa-check-circle{% elif message.tags == 'warning' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
        {% endif %}

        <div class="top-header">
            <h1 class="page-title">
                <i class="fas fa-edit"></i> Editar Equipo: {{ equipo.nombre }}
            </h1>
        </div>

        <div class="form-card">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Nombre del Equipo</label>
                    <input type="text" name="nombre" class="form-control" value="{{ equipo.nombre }}" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Descripción</label>
                    <textarea name="descripcion" rows="4" class="form-control">{{ equipo.descripcion }}</textarea>
                </div>
                <div class="btn-group">
                    <a href="{% url 'ver_equipo' equipo.id %}" class="btn btn-outline">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const messages = document.querySelectorAll('.toast-message');
        messages.forEach(function(msg) {
            setTimeout(function() {
                if (msg && msg.remove) msg.remove();
            }, 3000);
        });
    });
</script>

</body>
</html>
