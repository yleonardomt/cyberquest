<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Editar Usuario</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'principal.css' %}">
    <style>
        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-lg);
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .form-control {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: center;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .btn-back {
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
        }
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            color: var(--text-primary);
        }
        .info-box {
            background: var(--primary-light);
            border: 1px solid var(--primary);
            border-radius: var(--radius);
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--primary);
        }
        .password-note {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00aa00;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            z-index: 1000;
            animation: slideInRight 0.3s ease, fadeOut 3s ease 2.7s forwards;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-left: 4px solid white;
        }
        .toast-message.error {
            background: #cc0000;
        }
        .toast-message.warning {
            background: #ff8800;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    {% include 'nav.html' %}

    <main class="main-content">
        
        {% if messages %}
            {% for message in messages %}
            <div class="toast-message {% if message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% endif %}">
                <i class="fas {% if message.tags == 'error' %}fa-exclamation-triangle{% elif message.tags == 'success' %}fa-check-circle{% elif message.tags == 'warning' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
        {% endif %}

        <div class="top-header">
            <h1 class="page-title">
                <i class="fas fa-user-edit"></i> Editar Usuario
            </h1>
            <a href="{% url 'listar_usuarios' %}" class="btn btn-outline btn-back">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>

        <div class="form-container">
            <div class="info-box">
                <i class="fas fa-info-circle"></i> Editando usuario <strong>{{ perfil.usuario.username }}</strong>
            </div>
            
            <form method="POST" id="editUserForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre de usuario</label>
                    <input type="text" name="username" class="form-control" value="{{ perfil.usuario.username }}" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña <span style="color: var(--text-muted);">(dejar vacío para no cambiar)</span></label>
                    <input type="password" name="password" class="form-control" placeholder="Nueva contraseña">
                    <div class="password-note">
                        <i class="fas fa-info-circle"></i> Solo escribe si deseas cambiar la contraseña
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Rol</label>
                    <select name="rol" class="form-control">
                        <option value="ESTUDIANTE" {% if perfil.rol == 'ESTUDIANTE' %}selected{% endif %}>Competidor</option>
                        <option value="INSTRUCTOR" {% if perfil.rol == 'INSTRUCTOR' %}selected{% endif %}>Instructor</option>
                        <option value="ADMIN" {% if perfil.rol == 'ADMIN' %}selected{% endif %}>Administrador</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                    <a href="{% url 'listar_usuarios' %}" class="btn btn-outline">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    document.getElementById('editUserForm').addEventListener('submit', function(e) {
        const btn = this.querySelector('button[type="submit"]');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
        btn.disabled = true;
    });

    // Auto-remover mensajes toast
    document.addEventListener('DOMContentLoaded', function() {
        var messages = document.querySelectorAll('.toast-message');
        messages.forEach(function(msg) {
            setTimeout(function() {
                if (msg && msg.remove) msg.remove();
            }, 3000);
        });
    });
</script>

</body>
</html>
